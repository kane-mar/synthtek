# Synthtek - Docker Compose
# Quick start: docker compose up -d

services:
  synthtek:
    build:
      context: .
      dockerfile: Dockerfile
    image: synthtek:latest
    container_name: synthtek
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # WebUI
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=8080
      # Leave empty for open mode (no auth), or set a key for API protection
      - WEBUI_API_KEY=
      # LLM Provider (example: OpenAI)
      - SYNTHTEK_PROVIDER_TYPE=openai
      - SYNTHTEK_PROVIDER_API_KEY=
      - SYNTHTEK_PROVIDER_BASE_URL=
      - SYNTHTEK_PROVIDER_DEFAULT_MODEL=gpt-4o
      # Workspace & skills
      - SYNTHTEK_WORKSPACE=/data
      - HOME=/data
      - npm_config_cache=/data/.npm
    volumes:
      # Persist data across restarts
      - synthtek-data:/data

volumes:
  synthtek-data:
