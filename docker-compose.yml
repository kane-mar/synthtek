# Base compose file for synthtek
# Merge with dev/prod overrides as needed:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  synthtek:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synthtek
    restart: unless-stopped

    # Port mapping (WebUI)
    ports:
      - "8080:8080"

    # Volume mounts
    volumes:
      - ./config:/data/config
      - ./data:/data
      - ./logs:/data/logs

    # Environment variables
    environment:
      - NODE_ENV=production
      - SYNTHTEK_WORKSPACE=/data
      - LOG_LEVEL=info

    # Health check (ESM-compatible)
    healthcheck:
      test: ["CMD", "node", "-e", "import('fs').then(fs => process.exit(fs.existsSync('/app/dist/src/cli.js') ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    # Resource limits — removed deploy.resources block because it requires
    # CPU CFS scheduler support which is unavailable on many systems
    # (WSL2, VMs, minimal kernels). Use host-level limits instead.

    # Non-root user (matches Dockerfile)
    user: "1000:1000"
