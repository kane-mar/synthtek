version: "3.9"

services:
  synthtek:
    build:
      context: .
      dockerfile: Dockerfile
    image: synthtek:latest
    container_name: synthtek
    ports:
      - "3456:3456"
    volumes:
      # Persist conversations, config, and installed skills
      - synthtek_data:/data
    environment:
      - WEBUI_PORT=3456
      - WEBUI_HOST=0.0.0.0
      - SYNTHTEK_WORKSPACE=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"import('http').then(h => h.get('http://127.0.0.1:3456/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1)))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  synthtek_data:
