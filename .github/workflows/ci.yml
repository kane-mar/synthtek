name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          rm -f dist/tests/webui/*playwright*.test.js
          node --test --test-concurrency=2 --test-timeout=180000 dist/tests/**/*.test.js

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint
        run: npm run lint

  docker:
    name: Build & Push Docker Image
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to Production
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          set -e
          echo 'Pulling latest image...'
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          echo 'Stopping and removing existing container...'
          docker rm -f synthtek.prod 2>/dev/null || true

          echo 'Starting new container...'
          docker run -d \
            --name synthtek.prod \
            --restart unless-stopped \
            -p 3456:3456 \
            -v /volume1/docker/synthtek.prod/config:/root/.synthtek/config \
            -v /volume1/docker/synthtek.prod/workspace:/workspace \
            -e WEBUI_PORT=3456 \
            -e WEBUI_HOST=0.0.0.0 \
            -e SYNTHTEK_WORKSPACE=/workspace \
            -e HOME=/workspace \
            -e npm_config_cache=/workspace/.npm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          echo 'Cleaning up old images...'
          docker image prune -f

          echo '✅ Production deployment complete'

      - name: Health check
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' synthtek.prod 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Container is healthy"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "❌ Container health check failed (status: $STATUS)"
              exit 1
            fi
            sleep 5
          done

  e2e:
    name: E2E Tests
    needs: [deploy]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system deps and browsers
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          # Fix any broken dpkg state from previous interrupted installs
          (which sudo && sudo dpkg --configure -a) || dpkg --configure -a 2>/dev/null || true
          # Ensure apt is ready
          (which sudo && sudo apt-get update -qq) || apt-get update -qq 2>/dev/null || true
          # Install Playwright deps with noninteractive frontend (fallback to direct install)
          (which sudo && sudo env DEBIAN_FRONTEND=noninteractive npx playwright install-deps chromium) || \
            (which sudo && sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y -qq libnspr4 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2) || \
            env DEBIAN_FRONTEND=noninteractive npx playwright install-deps chromium 2>&1 || true
          npx playwright install chromium 2>&1

      - name: Run full browser e2e tests against production
        run: |
          # Try Docker gateway IP first, fall back to container IP
          SYNTHTEK_IP=$(docker inspect --format='{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' synthtek.prod 2>/dev/null | head -1)
          if [ -z "$SYNTHTEK_IP" ] || [ "$SYNTHTEK_IP" = "" ]; then
            SYNTHTEK_IP=$(docker inspect --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' synthtek.prod 2>/dev/null | head -1)
          fi
          if [ -z "$SYNTHTEK_IP" ] || [ "$SYNTHTEK_IP" = "" ]; then
            SYNTHTEK_IP="localhost"
          fi
          echo "Target: http://${SYNTHTEK_IP}:3456"
          # Verify connectivity first
          curl -sf "http://${SYNTHTEK_IP}:3456/api/health" && echo "Production reachable" || echo "Warning: health check failed, tests may fail"
          # Run only the current e2e test suite (matches current frontend HTML)
          E2E_BASE_URL="http://${SYNTHTEK_IP}:3456" BASE_URL="http://${SYNTHTEK_IP}:3456" \
            npx playwright test tests/e2e/synthtek-e2e.spec.ts --timeout=30000

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
