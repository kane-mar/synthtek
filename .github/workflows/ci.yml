name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          rm -f dist/tests/webui/*playwright*.test.js
          node --test --test-concurrency=2 --test-timeout=120000 dist/tests/**/*.test.js

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint
        run: npm run lint

  docker:
    name: Build & Push Docker Image
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to Production
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.PRODUCTION_PORT || '22' }} \
            ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} "
            set -e
            echo 'Pulling latest image...'
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo 'Stopping existing container...'
            docker stop synthtek 2>/dev/null || true
            docker rm synthtek 2>/dev/null || true

            echo 'Starting new container...'
            docker run -d \
              --name synthtek \
              --restart unless-stopped \
              -p ${{ secrets.PRODUCTION_PORT_MAPPING || '8080:8080' }} \
              -v /volume1/docker/synthtek/config:/root/.synthtek/config \
              -v /volume1/docker/synthtek/data:/root/.synthtek/data \
              -e SYNTHTEK_PORT=8080 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo 'Cleaning up old images...'
            docker image prune -f

            echo '✅ Production deployment complete'
          "

      - name: Health check
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.PRODUCTION_HOST }}:$(echo "${{ secrets.PRODUCTION_PORT_MAPPING || '8080' }}" | cut -d: -f1)/api/health \
              || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Container is healthy"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "❌ Container health check failed"
              exit 1
            fi
            sleep 5
          done

  e2e:
    name: E2E Tests
    needs: [deploy]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: "http://${{ secrets.PRODUCTION_HOST }}:$(echo \"${{ secrets.PRODUCTION_PORT_MAPPING || '8080' }}\" | cut -d: -f1)"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
