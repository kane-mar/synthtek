name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          rm -f dist/tests/webui/*playwright*.test.js
          node --test --test-concurrency=2 --test-timeout=180000 dist/tests/**/*.test.js

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint
        run: npm run lint

  docker:
    name: Build & Push Docker Image
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to Production
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          set -e
          echo 'Pulling latest image...'
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          echo 'Stopping and removing existing container...'
          docker rm -f synthtek.prod 2>/dev/null || true

          echo 'Starting new container...'
          docker run -d \
            --name synthtek.prod \
            --restart unless-stopped \
            --memory="512m" --memory-reservation="256m" \
            -p 3456:3456 \
            -v /volume1/docker/synthtek.prod/config:/root/.synthtek/config \
            -v /volume1/docker/synthtek.prod/workspace:/workspace \
            -e WEBUI_PORT=3456 \
            -e WEBUI_HOST=0.0.0.0 \
            -e SYNTHTEK_WORKSPACE=/workspace \
            -e HOME=/workspace \
            -e npm_config_cache=/workspace/.npm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          echo 'Cleaning up old images...'
          docker image prune -f

          echo '✅ Production deployment complete'

      - name: Health check
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' synthtek.prod 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Container is healthy"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "❌ Container health check failed (status: $STATUS)"
              exit 1
            fi
            sleep 5
          done

  e2e:
    name: E2E Tests
    needs: [deploy]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system deps and browsers
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          echo "=== Fixing dpkg state ==="
          # Fix broken dpkg from previous interrupted installs
          if which sudo >/dev/null 2>&1; then
            sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock
            sudo dpkg --configure -a || true
            echo "=== Installing system deps ==="
            sudo apt-get update -qq
            # Use sudo -E to preserve PATH so npx is found
            sudo -E env "PATH=$PATH" npx playwright install-deps chromium || \
            # Fallback: install packages directly
            sudo apt-get install -y -qq $(npx playwright install-deps chromium --dry-run 2>/dev/null | tr '\n' ' ') || \
            # Last resort: install known deps
            sudo apt-get install -y -qq libnspr4 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
              libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 \
              libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 \
              libatspi2.0-0 libwayland-client0
          else
            rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock
            dpkg --configure -a || true
            apt-get update -qq && npx playwright install-deps chromium
          fi
          echo "=== Installing Chromium ==="
          npx playwright install chromium 2>&1

      - name: Run full browser e2e tests against production
        run: |
          # Try Docker gateway IP first, fall back to container IP
          SYNTHTEK_IP=$(docker inspect --format='{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' synthtek.prod 2>/dev/null | head -1)
          if [ -z "$SYNTHTEK_IP" ] || [ "$SYNTHTEK_IP" = "" ]; then
            SYNTHTEK_IP=$(docker inspect --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' synthtek.prod 2>/dev/null | head -1)
          fi
          if [ -z "$SYNTHTEK_IP" ] || [ "$SYNTHTEK_IP" = "" ]; then
            SYNTHTEK_IP="localhost"
          fi
          TARGET="http://${SYNTHTEK_IP}:3456"
          echo "Target: $TARGET"

          # Outer retry loop — retry the entire test suite if container restarts mid-run
          for attempt in 1 2 3; do
            echo "=== E2E test attempt $attempt/3 ==="
            # Wait for production to be reachable (up to 60s)
            for i in $(seq 1 12); do
              if curl -sf "$TARGET/api/health" >/dev/null 2>&1; then
                echo "Production reachable after ${i}s"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "Warning: health check failed after 60s"
              fi
              sleep 5
            done

            # Small extra delay to let the container fully stabilize
            sleep 5

            # Run the current e2e test suite
            set +e
            E2E_BASE_URL="$TARGET" BASE_URL="$TARGET" \
              npx playwright test tests/e2e/synthtek-e2e.spec.ts --timeout=30000 --retries=2
            EXIT_CODE=$?
            set -e

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ All tests passed!"
              exit 0
            fi

            echo "⚠️  Tests failed (exit $EXIT_CODE), attempt $attempt/3"
            if [ $attempt -lt 3 ]; then
              echo "Waiting for container to stabilize (30s)..."
              sleep 30
            fi
          done

          echo "❌ Tests failed after 3 attempts"
          exit 1

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
