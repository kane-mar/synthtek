# Production overrides for synthtek
# Merge with base: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  synthtek:
    # Restart policy (already set in base, explicit here for clarity)
    restart: unless-stopped

    # Health check monitoring (already set in base, explicit here)
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').existsSync('/app/dist/cli.js') && process.exit(0)"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 5

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

    # Log rotation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
