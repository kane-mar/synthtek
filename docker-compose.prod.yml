# Production overrides for synthtek
# Merge with base: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  synthtek:
    # Restart policy (already set in base, explicit here for clarity)
    restart: unless-stopped

    # Health check (ESM-compatible)
    healthcheck:
      test: ["CMD", "node", "-e", "import('fs').then(fs => process.exit(fs.existsSync('/app/dist/src/cli.js') ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

    # Log rotation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
